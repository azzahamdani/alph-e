apiVersion: v1
kind: Namespace
metadata:
  name: mcp
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana-mcp
  namespace: mcp
  labels:
    app: grafana-mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana-mcp
  template:
    metadata:
      labels:
        app: grafana-mcp
    spec:
      containers:
        - name: mcp
          image: grafana/mcp-grafana:0.10.0-alpine
          imagePullPolicy: IfNotPresent
          args:
            - --transport=streamable-http
            - --address=0.0.0.0:8000
            - --disable-write
          ports:
            - name: http
              containerPort: 8000
          env:
            # Cluster-internal Grafana. The chart sets the service port to 80.
            - name: GRAFANA_URL
              value: http://kps-grafana.monitoring.svc.cluster.local:80
            - name: GRAFANA_SERVICE_ACCOUNT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: grafana-mcp-token
                  key: token
          resources:
            requests:
              cpu: 20m
              memory: 64Mi
            limits:
              memory: 256Mi
          # The MCP server exposes /healthz for liveness.
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: grafana-mcp
  namespace: mcp
  labels:
    app: grafana-mcp
spec:
  type: ClusterIP
  selector:
    app: grafana-mcp
  ports:
    - name: http
      port: 8000
      targetPort: http
