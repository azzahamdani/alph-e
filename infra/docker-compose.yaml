# Host-side infra for the agent layer. Unrelated to the in-cluster monitoring stack.
# - postgres (pgvector): LangGraph checkpoints + evidence metadata + semantic memory
# - minio: S3-compatible evidence blob store
# - minio-init: one-shot that creates the `incidents` bucket with a 30-day lifecycle rule

name: devops-agent-infra

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: devops-agent-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: devops
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devops}
      POSTGRES_DB: incidents
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devops -d incidents"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: devops-agent-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio-dev-secret}
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"  # S3 API
      - "9001:9001"  # console
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio-init:
    image: minio/mc:latest
    container_name: devops-agent-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -eu
        mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"
        mc mb --ignore-existing local/incidents
        # 30-day lifecycle rule — matches ADR-0006 + EvidenceRef.expires_at default
        mc ilm rule add --expire-days 30 local/incidents || true
        mc ilm rule ls local/incidents
        echo "minio-init: incidents bucket ready with 30-day TTL"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio-dev-secret}
    restart: "no"

volumes:
  postgres-data:
  minio-data:
