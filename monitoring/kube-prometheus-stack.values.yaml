# kube-prometheus-stack values tuned for local lab use.
# Drops sidecars/rules we don't need, exposes Grafana without login friction.

fullnameOverride: kps

defaultRules:
  create: true
  rules:
    # Trim noisy rules that don't apply to a single-node lab
    etcd: false
    kubeApiserverAvailability: false
    kubeApiserverBurnrate: false
    kubeApiserverHistogram: false
    kubeApiserverSlos: false
    kubeControllerManager: false
    kubeSchedulerAlerting: false
    kubeSchedulerRecording: false
    kubeProxy: false

alertmanager:
  enabled: true
  service:
    type: NodePort
    nodePort: 30093
  alertmanagerSpec:
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        memory: 128Mi
  # Route every firing alert to the in-cluster agent's Intake webhook.
  # The agent Deployment lives in the `agent` namespace (see agent/manifests.yaml
  # and ADR-0005). For host-side dev (`task agent:serve`), fire fixtures via
  # `task agent:fire` instead — Alertmanager cannot reach the host from here.
  config:
    global:
      resolve_timeout: 5m
    route:
      receiver: alph-e-agent
      group_wait: 10s
      group_interval: 30s
      repeat_interval: 5m
      routes:
        - matchers:
            - alertname = "Watchdog"
          receiver: "null"
    receivers:
      - name: "null"
      - name: alph-e-agent
        webhook_configs:
          - url: http://agent.agent.svc.cluster.local:8000/webhook/alertmanager
            send_resolved: true
            max_alerts: 0

grafana:
  enabled: true
  adminPassword: admin
  service:
    type: NodePort
    nodePort: 30000
  # Anonymous admin access — fine for local, never do this in prod
  grafana.ini:
    auth.anonymous:
      enabled: true
      org_role: Admin
    auth:
      disable_login_form: false
  defaultDashboardsTimezone: browser
  resources:
    requests:
      cpu: 20m
      memory: 64Mi
    limits:
      memory: 256Mi
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
    datasources:
      enabled: true

prometheus:
  service:
    type: NodePort
    nodePort: 30090
  prometheusSpec:
    retention: 6h
    retentionSize: 2GB
    resources:
      requests:
        cpu: 50m
        memory: 256Mi
      limits:
        memory: 1Gi
    # Auto-discover ServiceMonitors in any namespace
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 4Gi

# Lab-scale — disable the heavyweight pieces we don't need
kubeControllerManager:
  enabled: false
kubeScheduler:
  enabled: false
kubeProxy:
  enabled: false
kubeEtcd:
  enabled: false

nodeExporter:
  enabled: true

kube-state-metrics:
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      memory: 128Mi

prometheus-node-exporter:
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      memory: 64Mi
