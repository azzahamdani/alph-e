# Loki in single-binary mode with filesystem storage.
# Logs are the other half of what the collector agent needs.

deploymentMode: SingleBinary

loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  storage:
    type: filesystem
  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: index_
          period: 24h
  limits_config:
    retention_period: 24h
    allow_structured_metadata: true
    volume_enabled: true

singleBinary:
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 512Mi
  persistence:
    enabled: true
    size: 5Gi

# Disable the pieces we don't need in single-binary mode
read:
  replicas: 0
write:
  replicas: 0
backend:
  replicas: 0
chunksCache:
  enabled: false
resultsCache:
  enabled: false
gateway:
  enabled: false

minio:
  enabled: false

test:
  enabled: false
lokiCanary:
  enabled: false
