id: WI-002
title: In-cluster agent-infra — Postgres (pgvector) + MinIO via Helm
component: infra.agent-infra
acceptance_criteria:
  - task agent-infra:install succeeds cleanly on a fresh k3d cluster
  - Postgres runs in the agent-infra namespace on port 5432 with pgvector
    extension loaded (\dx shows vector)
  - MinIO runs in the agent-infra namespace exposing S3 API on port 9000 and
    console on port 9001
  - The `incidents` bucket exists with a 30-day lifecycle rule applied via the
    minio-lifecycle-bootstrap Job
  - task agent-infra:postgres and task agent-infra:minio expose each service to
    the host via port-forward
  - task agent-infra:psql opens a working psql session against the incidents
    database
  - task agent-infra:nuke cleanly removes the namespace and PVCs
  - Credentials preserved from the old docker-compose defaults so EvidenceClient
    doesn't need changes (devops/devops, minio/minio-dev-secret, bucket
    `incidents`)
  - README and CLAUDE.md document the agent-infra layout and access pattern
interface_contracts: []
relevant_adrs:
  - ADR-0008
allowed_paths:
  - agent-infra/**
  - Taskfile.yml
  - README.md
  - CLAUDE.md
blocked_paths:
  - agent/**
  - collectors/**
  - cluster/**
  - monitoring/**
  - mcp/**
  - demo-app/**
depends_on: []
estimated_complexity: small
max_iterations: 2
