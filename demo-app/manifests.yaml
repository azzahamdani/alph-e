apiVersion: v1
kind: Namespace
metadata:
  name: demo
  labels:
    # Allow Prometheus to scrape across namespaces
    monitoring: enabled
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: leaky-service
  namespace: demo
  labels:
    app: leaky-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: leaky-service
  template:
    metadata:
      labels:
        app: leaky-service
    spec:
      containers:
        - name: app
          image: registry.localhost:5000/leaky-service:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          # Tight limit: background leaker adds ~2MB/sec, so OOM hits in ~60s.
          # This is the bug the agent will investigate.
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: leaky-service
  namespace: demo
  labels:
    app: leaky-service
spec:
  type: ClusterIP
  selector:
    app: leaky-service
  ports:
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: leaky-service
  namespace: demo
  labels:
    app: leaky-service
spec:
  selector:
    matchLabels:
      app: leaky-service
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
