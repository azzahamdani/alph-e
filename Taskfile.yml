# Taskfile for the DevOps Agent lab.
# Install: https://taskfile.dev/installation/
# Usage:   task cluster:up && task monitoring:install && task demo:deploy

version: "3"

vars:
  CLUSTER_NAME: devops-agent
  REGISTRY: registry.localhost:5000
  MONITORING_NS: monitoring

tasks:

  # ── Cluster lifecycle ────────────────────────────────────────────────

  cluster:up:
    desc: Create the k3d cluster with registry and port mappings
    cmds:
      - k3d cluster create --config cluster/k3d-config.yaml
      - kubectl cluster-info
      - kubectl wait --for=condition=Ready nodes --all --timeout=120s

  cluster:down:
    desc: Delete the cluster (registry is kept — use cluster:nuke to remove it)
    cmds:
      - k3d cluster delete {{.CLUSTER_NAME}}

  cluster:nuke:
    desc: Delete cluster AND the local registry
    cmds:
      - k3d cluster delete {{.CLUSTER_NAME}} || true
      - k3d registry delete registry.localhost || true

  cluster:status:
    desc: Show cluster health at a glance
    cmds:
      - kubectl get nodes -o wide
      - kubectl get pods -A

  # ── Monitoring stack ─────────────────────────────────────────────────

  monitoring:repos:
    desc: Add Helm repos for monitoring stack
    cmds:
      - helm repo add prometheus-community
        https://prometheus-community.github.io/helm-charts
      - helm repo add grafana https://grafana.github.io/helm-charts
      - helm repo update

  monitoring:install:
    desc: Install kube-prometheus-stack, Loki, and Alloy
    deps: [ monitoring:repos ]
    cmds:
      - kubectl create namespace {{.MONITORING_NS}} --dry-run=client -o yaml |
        kubectl apply -f -
      - |
        helm upgrade --install kps prometheus-community/kube-prometheus-stack \
          --namespace {{.MONITORING_NS}} \
          --values monitoring/kube-prometheus-stack.values.yaml \
          --wait --timeout 10m
      - |
        helm upgrade --install loki grafana/loki \
          --namespace {{.MONITORING_NS}} \
          --values monitoring/loki.values.yaml \
          --wait --timeout 5m
      - |
        helm upgrade --install alloy grafana/alloy \
          --namespace {{.MONITORING_NS}} \
          --values monitoring/alloy.values.yaml \
          --wait --timeout 5m
      - task: monitoring:loki-datasource

  monitoring:loki-datasource:
    desc: Register Loki as a Grafana datasource
    cmds:
      - |
        kubectl apply -n {{.MONITORING_NS}} -f - <<EOF
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: loki-datasource
          labels:
            grafana_datasource: "1"
        data:
          loki.yaml: |
            apiVersion: 1
            datasources:
              - name: Loki
                type: loki
                access: proxy
                url: http://loki.{{.MONITORING_NS}}.svc.cluster.local:3100
                isDefault: false
        EOF

  monitoring:uninstall:
    desc: Remove the monitoring stack
    cmds:
      - helm uninstall alloy -n {{.MONITORING_NS}} || true
      - helm uninstall loki -n {{.MONITORING_NS}} || true
      - helm uninstall kps -n {{.MONITORING_NS}} || true

  # ── UI port-forwards (each blocks — run in separate terminals) ──────

  grafana:
    desc: Port-forward Grafana to http://localhost:3000 (admin/admin)
    cmds:
      - echo "Grafana → http://localhost:3000 (admin/admin, skip password
        change)"
      - kubectl -n {{.MONITORING_NS}} port-forward svc/kps-grafana 3000:80

  prometheus:
    desc: Port-forward Prometheus to http://localhost:9090
    cmds:
      - echo "Prometheus → http://localhost:9090"
      - kubectl -n {{.MONITORING_NS}} port-forward svc/kps-prometheus 9090:9090

  alertmanager:
    desc: Port-forward Alertmanager to http://localhost:9093
    cmds:
      - echo "Alertmanager → http://localhost:9093"
      - kubectl -n {{.MONITORING_NS}} port-forward svc/kps-alertmanager 9093:9093

  # ── Demo app ─────────────────────────────────────────────────────────

  demo:build:
    desc: Build and push the leaky-service image to the local registry
    dir: demo-app
    cmds:
      - docker build -t {{.REGISTRY}}/leaky-service:latest .
      - docker push {{.REGISTRY}}/leaky-service:latest

  demo:deploy:
    desc: Deploy the leaky-service demo app
    deps: [ demo:build ]
    cmds:
      - kubectl apply -f demo-app/manifests.yaml
      - kubectl -n demo rollout status deployment/leaky-service --timeout=120s

  demo:undeploy:
    desc: Remove the demo app
    cmds:
      - kubectl delete -f demo-app/manifests.yaml --ignore-not-found

  demo:watch:
    desc: Watch the pod go through OOM cycles
    cmds:
      - kubectl -n demo get pods -w

  demo:logs:
    desc: Tail the demo app logs
    cmds:
      - kubectl -n demo logs -f deployment/leaky-service

  demo:describe:
    desc: Describe the current pod (shows OOMKilled in Events)
    cmds:
      - kubectl -n demo describe pod -l app=leaky-service

  # ── Grafana MCP server ───────────────────────────────────────────────

  mcp:token:
    desc: Create/refresh the Grafana service account token and store it as a Secret
    cmds:
      - bash mcp/bootstrap-token.sh

  mcp:install:
    desc: Deploy the Grafana MCP server into the cluster
    cmds:
      - kubectl apply -f mcp/manifests.yaml
      - |
        if ! kubectl -n mcp get secret grafana-mcp-token >/dev/null 2>&1; then
          echo ""
          echo "⚠  Secret 'grafana-mcp-token' not found — MCP pod will fail until you run:"
          echo "    task grafana          # in a separate terminal"
          echo "    task mcp:token        # creates the SA token and the Secret"
          echo ""
        fi
      - kubectl -n mcp rollout status deployment/grafana-mcp --timeout=60s ||
        true

  mcp:forward:
    desc: Port-forward the MCP server to http://localhost:8000/mcp
    cmds:
      - echo "Grafana MCP → http://localhost:8000/mcp"
      - kubectl -n mcp port-forward svc/grafana-mcp 8000:8000

  mcp:logs:
    desc: Tail MCP server logs
    cmds:
      - kubectl -n mcp logs -f deployment/grafana-mcp

  mcp:uninstall:
    desc: Remove the MCP server
    cmds:
      - kubectl delete -f mcp/manifests.yaml --ignore-not-found

  # ── Everything ───────────────────────────────────────────────────────

  up:
    desc: Full bootstrap — cluster + monitoring + agent-infra + demo + mcp
    cmds:
      - task: cluster:up
      - task: monitoring:install
      - task: agent-infra:install
      - task: demo:deploy
      - task: mcp:install
      - task: urls

  urls:
    desc: Print how to access the lab
    cmds:
      - |
        echo ""
        echo "  Cluster UIs — run each in its own terminal (they block):"
        echo "    task grafana                → http://localhost:3000  (admin / admin)"
        echo "    task prometheus             → http://localhost:9090"
        echo "    task alertmanager           → http://localhost:9093"
        echo "    task mcp:forward            → http://localhost:8000/mcp"
        echo ""
        echo "  Agent-infra (cluster-internal; port-forward for host access):"
        echo "    task agent-infra:postgres   → localhost:5432"
        echo "    task agent-infra:minio      → localhost:9000 / :9001"
        echo ""
        echo "  Watch the OOM loop:   task demo:watch"
        echo ""

  # ── Monitoring: alert rules (host-side agent) ────────────────────────

  monitoring:alerts:
    desc: Apply the PrometheusRule CR that fires the agent's canned incidents
    cmds:
      - kubectl apply -n {{.MONITORING_NS}} -f monitoring/alert-rules.yaml

  # ── Agent (Python orchestrator) ──────────────────────────────────────

  agent:install:
    desc: Resolve Python deps via uv (creates agent/.venv)
    dir: agent
    cmds:
      - uv sync --all-extras

  agent:lint:
    desc: ruff + mypy --strict on the agent package
    dir: agent
    cmds:
      - uv run ruff check src tests
      - uv run ruff format --check src tests
      - uv run mypy --strict src

  agent:test:
    desc: Run the agent unit test suite
    dir: agent
    cmds:
      - uv run pytest -q

  agent:serve:
    desc: Start the Intake FastAPI on :8000
    dir: agent
    cmds:
      - uv run python -m agent serve --reload

  agent:fire:
    desc: Fire the OOM fixture at the in-process Intake app
    dir: agent
    cmds:
      - uv run python -m agent fire
        tests/fixtures/incidents/oom-leaky-service.json

  # ── Collectors (Go) ──────────────────────────────────────────────────

  collectors:lint:
    desc: golangci-lint across the collectors module
    dir: collectors
    cmds:
      - golangci-lint run ./...

  collectors:test:
    desc: go test with -race
    dir: collectors
    cmds:
      - go test ./... -race -count=1

  collectors:build:
    desc: Build the three collector binaries into collectors/bin
    dir: collectors
    cmds:
      - make build

  collectors:run:
    desc: Run all three collectors on :8001 / :8002 / :8003
    dir: collectors
    cmds:
      - make run

  # ── Agent-infra (Postgres + MinIO, in-cluster) ───────────────────────
  # Replaces the old host-side docker-compose stack. Helm-based.
  # See agent-infra/README.md and ADR-0008.

  agent-infra:repos:
    desc: Add the Helm repos for Postgres (Bitnami) + MinIO (official)
    cmds:
      - helm repo add bitnami https://charts.bitnami.com/bitnami
      - helm repo add minio https://charts.min.io/
      - helm repo update bitnami minio

  agent-infra:install:
    desc: Install Postgres + MinIO + bucket bootstrap Job in the cluster
    deps: [ agent-infra:repos ]
    cmds:
      - kubectl create namespace agent-infra --dry-run=client -o yaml | kubectl
        apply -f -
      - |
        helm upgrade --install postgres bitnami/postgresql \
          --namespace agent-infra \
          --values agent-infra/values/postgresql.values.yaml \
          --wait --timeout 5m
      - |
        helm upgrade --install minio minio/minio \
          --namespace agent-infra \
          --values agent-infra/values/minio.values.yaml \
          --wait --timeout 5m
      - kubectl apply -f agent-infra/manifests/minio-lifecycle-job.yaml
      - kubectl -n agent-infra wait --for=condition=complete
        job/minio-lifecycle-bootstrap --timeout=2m
      - kubectl -n agent-infra logs job/minio-lifecycle-bootstrap

  agent-infra:uninstall:
    desc: Uninstall Postgres + MinIO (keeps PVCs)
    cmds:
      - helm uninstall minio -n agent-infra || true
      - helm uninstall postgres -n agent-infra || true
      - kubectl delete job minio-lifecycle-bootstrap -n agent-infra
        --ignore-not-found

  agent-infra:nuke:
    desc: Uninstall AND delete PVCs (wipes all data)
    cmds:
      - task: agent-infra:uninstall
      - kubectl delete pvc -n agent-infra --all --ignore-not-found
      - kubectl delete namespace agent-infra --ignore-not-found

  agent-infra:status:
    desc: Show Postgres + MinIO pods
    cmds:
      - kubectl get pods,svc,pvc -n agent-infra

  # Port-forwards — each blocks. Run in separate terminals.
  # Host-agent (MVP1) talks to these as localhost; in-cluster agent (MVP2)
  # bypasses and uses service DNS directly.

  agent-infra:postgres:
    desc: Port-forward Postgres to localhost:5432
    cmds:
      - echo "Postgres → localhost:5432 (devops/devops, db=incidents)"
      - kubectl -n agent-infra port-forward svc/postgres 5432:5432

  agent-infra:minio:
    desc: Port-forward MinIO API to localhost:9000 + console to localhost:9001
    cmds:
      - echo "MinIO S3  → localhost:9000 (minio / minio-dev-secret)"
      - echo "MinIO UI  → localhost:9001"
      - |
        # Forward both services in parallel, kill both on exit
        kubectl -n agent-infra port-forward svc/minio 9000:9000 &
        FWD1=$!
        kubectl -n agent-infra port-forward svc/minio-console 9001:9001 &
        FWD2=$!
        trap "kill $FWD1 $FWD2 2>/dev/null" EXIT INT TERM
        wait

  agent-infra:psql:
    desc: Exec into the Postgres pod and open a psql shell
    cmds:
      - |
        POD=$(kubectl -n agent-infra get pod -l app.kubernetes.io/name=postgresql -o jsonpath='{.items[0].metadata.name}')
        kubectl -n agent-infra exec -it "$POD" -- env PGPASSWORD=devops psql -U devops -d incidents

  agent-infra:logs:
    desc: Tail Postgres + MinIO logs
    cmds:
      - kubectl -n agent-infra logs -f -l
        'app.kubernetes.io/part-of!=agent-infra' --all-containers --prefix=true
        --tail=50

  # ── Dev aggregate ────────────────────────────────────────────────────

  dev:
    desc: Bring up agent-infra + collectors + agent for local development
    deps: [ agent-infra:install ]
    cmds:
      - |
        echo ""
        echo "  agent-infra is up. In separate terminals run:"
        echo "    task agent-infra:postgres   # localhost:5432"
        echo "    task agent-infra:minio      # localhost:9000 / :9001"
        echo "    task collectors:run         # ports 8001/8002/8003"
        echo "    task agent:serve            # port 8000 (Alertmanager target)"
        echo ""
