# Taskfile for the DevOps Agent lab.
# Install: https://taskfile.dev/installation/
# Usage:   task cluster:up && task monitoring:install && task demo:deploy

version: "3"

vars:
  CLUSTER_NAME: devops-agent
  REGISTRY: registry.localhost:5000
  MONITORING_NS: monitoring

tasks:

  # ── Cluster lifecycle ────────────────────────────────────────────────

  cluster:up:
    desc: Create the k3d cluster with registry and port mappings
    cmds:
      - k3d cluster create --config cluster/k3d-config.yaml
      - kubectl cluster-info
      - kubectl wait --for=condition=Ready nodes --all --timeout=120s

  cluster:down:
    desc: Delete the cluster (registry is kept — use cluster:nuke to remove it)
    cmds:
      - k3d cluster delete {{.CLUSTER_NAME}}

  cluster:nuke:
    desc: Delete cluster AND the local registry
    cmds:
      - k3d cluster delete {{.CLUSTER_NAME}} || true
      - k3d registry delete registry.localhost || true

  cluster:status:
    desc: Show cluster health at a glance
    cmds:
      - kubectl get nodes -o wide
      - kubectl get pods -A

  # ── Monitoring stack ─────────────────────────────────────────────────

  monitoring:repos:
    desc: Add Helm repos for monitoring stack
    cmds:
      - helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
      - helm repo add grafana https://grafana.github.io/helm-charts
      - helm repo update

  monitoring:install:
    desc: Install kube-prometheus-stack, Loki, and Alloy
    deps: [monitoring:repos]
    cmds:
      - kubectl create namespace {{.MONITORING_NS}} --dry-run=client -o yaml | kubectl apply -f -
      - |
        helm upgrade --install kps prometheus-community/kube-prometheus-stack \
          --namespace {{.MONITORING_NS}} \
          --values monitoring/kube-prometheus-stack.values.yaml \
          --wait --timeout 10m
      - |
        helm upgrade --install loki grafana/loki \
          --namespace {{.MONITORING_NS}} \
          --values monitoring/loki.values.yaml \
          --wait --timeout 5m
      - |
        helm upgrade --install alloy grafana/alloy \
          --namespace {{.MONITORING_NS}} \
          --values monitoring/alloy.values.yaml \
          --wait --timeout 5m
      - task: monitoring:loki-datasource

  monitoring:loki-datasource:
    desc: Register Loki as a Grafana datasource
    cmds:
      - |
        kubectl apply -n {{.MONITORING_NS}} -f - <<EOF
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: loki-datasource
          labels:
            grafana_datasource: "1"
        data:
          loki.yaml: |
            apiVersion: 1
            datasources:
              - name: Loki
                type: loki
                access: proxy
                url: http://loki.{{.MONITORING_NS}}.svc.cluster.local:3100
                isDefault: false
        EOF

  monitoring:uninstall:
    desc: Remove the monitoring stack
    cmds:
      - helm uninstall alloy -n {{.MONITORING_NS}} || true
      - helm uninstall loki -n {{.MONITORING_NS}} || true
      - helm uninstall kps -n {{.MONITORING_NS}} || true

  # ── Demo app ─────────────────────────────────────────────────────────

  demo:build:
    desc: Build and push the leaky-service image to the local registry
    dir: demo-app
    cmds:
      - docker build -t {{.REGISTRY}}/leaky-service:latest .
      - docker push {{.REGISTRY}}/leaky-service:latest

  demo:deploy:
    desc: Deploy the leaky-service demo app
    deps: [demo:build]
    cmds:
      - kubectl apply -f demo-app/manifests.yaml
      - kubectl -n demo rollout status deployment/leaky-service --timeout=120s

  demo:undeploy:
    desc: Remove the demo app
    cmds:
      - kubectl delete -f demo-app/manifests.yaml --ignore-not-found

  demo:watch:
    desc: Watch the pod go through OOM cycles
    cmds:
      - kubectl -n demo get pods -w

  demo:logs:
    desc: Tail the demo app logs
    cmds:
      - kubectl -n demo logs -f deployment/leaky-service

  demo:describe:
    desc: Describe the current pod (shows OOMKilled in Events)
    cmds:
      - kubectl -n demo describe pod -l app=leaky-service

  # ── Grafana MCP server ───────────────────────────────────────────────

  mcp:token:
    desc: Create/refresh the Grafana service account token and store it as a Secret
    cmds:
      - bash mcp/bootstrap-token.sh

  mcp:install:
    desc: Deploy the Grafana MCP server into the cluster
    cmds:
      - kubectl apply -f mcp/manifests.yaml
      - |
        if ! kubectl -n mcp get secret grafana-mcp-token >/dev/null 2>&1; then
          echo ""
          echo "⚠  Secret 'grafana-mcp-token' not found — MCP pod will fail until you run:"
          echo "    task grafana          # in a separate terminal"
          echo "    task mcp:token        # creates the SA token and the Secret"
          echo ""
        fi
      - kubectl -n mcp rollout status deployment/grafana-mcp --timeout=60s ||
        true

  mcp:forward:
    desc: Port-forward the MCP server to http://localhost:8000/mcp
    cmds:
      - echo "Grafana MCP → http://localhost:8000/mcp"
      - kubectl -n mcp port-forward svc/grafana-mcp 8000:8000

  mcp:logs:
    desc: Tail MCP server logs
    cmds:
      - kubectl -n mcp logs -f deployment/grafana-mcp

  mcp:uninstall:
    desc: Remove the MCP server
    cmds:
      - kubectl delete -f mcp/manifests.yaml --ignore-not-found

  # ── Everything ───────────────────────────────────────────────────────

  up:
    desc: Full bootstrap — cluster + monitoring + demo app
    cmds:
      - task: cluster:up
      - task: monitoring:install
      - task: demo:deploy
      - task: urls

  urls:
    desc: Print the URLs for Grafana/Prometheus/Alertmanager
    cmds:
      - |
        echo ""
        echo "  Grafana:      http://localhost:3000  (admin / admin)"
        echo "  Prometheus:   http://localhost:9090"
        echo "  Alertmanager: http://localhost:9093"
        echo ""
        echo "  Watch the OOM loop:   task demo:watch"
        echo ""

  # ── Monitoring: alert rules (host-side agent) ────────────────────────

  monitoring:alerts:
    desc: Apply the PrometheusRule CR that fires the agent's canned incidents
    cmds:
      - kubectl apply -n {{.MONITORING_NS}} -f monitoring/alert-rules.yaml

  # ── Agent (Python orchestrator) ──────────────────────────────────────

  agent:install:
    desc: Resolve Python deps via uv (creates agent/.venv)
    dir: agent
    cmds:
      - uv sync --all-extras

  agent:lint:
    desc: ruff + mypy --strict on the agent package
    dir: agent
    cmds:
      - uv run ruff check src tests
      - uv run ruff format --check src tests
      - uv run mypy --strict src

  agent:test:
    desc: Run the agent unit test suite
    dir: agent
    cmds:
      - uv run pytest -q

  agent:serve:
    desc: Start the Intake FastAPI on :8000
    dir: agent
    cmds:
      - uv run python -m agent serve --reload

  agent:fire:
    desc: Fire the OOM fixture at the in-process Intake app
    dir: agent
    cmds:
      - uv run python -m agent fire tests/fixtures/incidents/oom-leaky-service.json

  # ── Collectors (Go) ──────────────────────────────────────────────────

  collectors:lint:
    desc: golangci-lint across the collectors module
    dir: collectors
    cmds:
      - golangci-lint run ./...

  collectors:test:
    desc: go test with -race
    dir: collectors
    cmds:
      - go test ./... -race -count=1

  collectors:build:
    desc: Build the three collector binaries into collectors/bin
    dir: collectors
    cmds:
      - make build

  collectors:run:
    desc: Run all three collectors on :8001 / :8002 / :8003
    dir: collectors
    cmds:
      - make run

  # ── Agent-side infra (Postgres + MinIO) ──────────────────────────────

  infra:up:
    desc: Start Postgres + MinIO via docker compose
    dir: infra
    cmds:
      - docker compose up -d

  infra:down:
    desc: Stop the host-side infra stack
    dir: infra
    cmds:
      - docker compose down

  infra:logs:
    desc: Follow infra container logs
    dir: infra
    cmds:
      - docker compose logs -f

  infra:psql:
    desc: Open a psql shell against the local postgres container
    dir: infra
    cmds:
      - docker compose exec postgres psql -U postgres -d incidents

  # ── Dev aggregate ────────────────────────────────────────────────────

  dev:
    desc: Bring up infra + collectors + agent for local development
    deps: [infra:up]
    cmds:
      - |
        echo ""
        echo "  infra is up. In separate terminals run:"
        echo "    task collectors:run    # ports 8001/8002/8003"
        echo "    task agent:serve       # port 8000 (Alertmanager target)"
        echo ""
